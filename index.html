<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMT Lahore | Donation Blink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .umt-gradient { background: linear-gradient(135deg, #006838 0%, #004d2a 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .wallet-option:hover { background: #f1f5f9; transform: scale(1.02); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-[450px] w-full glass-card rounded-[3rem] shadow-[0_40px_100px_-20px_rgba(0,104,56,0.15)] border border-white overflow-hidden">
        
        <div class="px-8 pt-8 flex justify-between items-center text-center">
            <div class="flex items-center gap-2">
                <span id="statusIndicator" class="w-2 h-2 bg-red-500 rounded-full"></span>
                <span id="statusText" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Disconnected</span>
            </div>
            <button id="mainWalletBtn" onclick="showWalletOptions()" class="bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-[11px] font-bold shadow-lg hover:bg-[#006838] transition-all">
                Connect Wallet
            </button>
        </div>

        <div class="p-10 text-center">
            <div class="w-20 h-20 umt-gradient rounded-[2rem] mx-auto mb-6 flex items-center justify-center shadow-xl">
                <span class="text-white font-black text-2xl italic">UMT</span>
            </div>
            <h1 class="text-slate-900 text-2xl font-black">UMT Donation Hub</h1>
        </div>

        <div class="px-10 pb-12 space-y-6">
            <div class="bg-slate-50 rounded-2xl p-5 border border-slate-100">
                <p class="text-slate-500 text-xs font-semibold text-center leading-relaxed">
                    Select an amount to donate via Solana Blink protocol.
                </p>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="processDonation('0.1')" class="py-3 border-2 border-slate-100 rounded-xl font-bold text-slate-600 hover:border-[#006838] hover:text-[#006838] transition-all">0.1 SOL</button>
                <button onclick="processDonation('1.0')" class="py-3 border-2 border-slate-100 rounded-xl font-bold text-slate-600 hover:border-[#006838] hover:text-[#006838] transition-all">1.0 SOL</button>
            </div>

            <button onclick="processDonation('custom')" class="w-full py-5 umt-gradient text-white rounded-2xl font-bold text-lg shadow-lg hover:opacity-90 transition-all flex items-center justify-center gap-2">
                Donate Now
            </button>

            <div class="pt-6 border-t border-slate-50 flex flex-col items-center gap-4">
                <a href="https://github.com/iqrashah1/umt-donation" target="_blank" class="text-[10px] font-black text-slate-400 hover:text-[#006838] flex items-center gap-2 uppercase tracking-widest">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                    Source Code
                </a>
            </div>
        </div>
    </div>

    <script>
        let isConnected = false;

        // 1. Show Wallet Selection Pop-up
        function showWalletOptions() {
            Swal.fire({
                title: 'Select Solana Wallet',
                html: `
                    <div class="flex flex-col gap-3 mt-4">
                        <button onclick="connectWallet('Phantom')" class="wallet-option flex items-center gap-4 p-4 border rounded-2xl transition-all">
                            <img src="https://phantom.app/favicon.ico" class="w-6 h-6">
                            <span class="font-bold text-slate-700">Phantom Wallet</span>
                        </button>
                        <button onclick="connectWallet('Solflare')" class="wallet-option flex items-center gap-4 p-4 border rounded-2xl transition-all">
                            <img src="https://solflare.com/favicon.ico" class="w-6 h-6">
                            <span class="font-bold text-slate-700">Solflare Wallet</span>
                        </button>
                    </div>
                `,
                showConfirmButton: false,
                showCloseButton: true,
                customClass: { popup: 'rounded-[2rem]' }
            });
        }

        // 2. Handle Connection
        function connectWallet(name) {
            isConnected = true;
            document.getElementById('statusIndicator').className = "w-2 h-2 bg-green-500 rounded-full animate-pulse";
            document.getElementById('statusText').innerText = "Connected: " + name;
            document.getElementById('mainWalletBtn').innerText = name.substring(0,4) + "... Connected";
            
            Swal.fire({
                icon: 'success',
                title: name + ' Connected',
                toast: true,
                position: 'top-end',
                timer: 2000,
                showConfirmButton: false
            });
        }

        // 3. Process Donation with Success/Error Handling
        function processDonation(amount) {
            if (!isConnected) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Wallet Required',
                    text: 'Please connect your wallet first!',
                    confirmButtonColor: '#006838'
                });
                return;
            }

            // Show Loading
            Swal.fire({
                title: 'Processing Donation...',
                text: 'Waiting for network confirmation',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            // Simulate Network Response
            setTimeout(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'Donation Successful!',
                    text: `Thank you for donating ${amount === 'custom' ? 'SOL' : amount + ' SOL'} to UMT Lahore.`,
                    confirmButtonColor: '#006838',
                    footer: '<a href="https://dial.to" target="_blank" style="color:#006838; font-weight:bold;">View on Solscan</a>'
                });
            }, 2500);
        }
    </script>
</body>
</html>
