<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMT Lahore | Donation Blink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            background-image: radial-gradient(#e2e8f0 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }
        .umt-gradient { background: linear-gradient(135deg, #006838 0%, #004d2a 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-[450px] w-full glass-card rounded-[3rem] shadow-[0_40px_100px_-20px_rgba(0,104,56,0.15)] border border-white overflow-hidden">
        
        <div class="px-8 pt-8 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Live</span>
            </div>
            <button id="walletBtn" onclick="toggleWallet()" class="flex items-center gap-2 bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-[11px] font-bold transition-all hover:bg-[#006838] active:scale-95 shadow-lg shadow-slate-200">
                <svg id="walletIcon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h7"></path><rect x="12" y="11" width="8" height="4" rx="2"></rect></svg>
                <span id="walletText">Connect Wallet</span>
            </button>
        </div>

        <div class="p-10 text-center">
            <div class="w-24 h-24 umt-gradient rounded-[2.5rem] mx-auto mb-6 flex items-center justify-center shadow-2xl shadow-green-900/30 animate-float">
                <span class="text-white font-black text-3xl tracking-tighter italic">UMT</span>
            </div>
            <h1 class="text-slate-900 text-3xl font-black tracking-tight leading-tight">UMT Donation<br><span class="text-[#006838]">Blink Protocol</span></h1>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.2em] mt-4">Lahore Blockchain Hub</p>
        </div>

        <div class="px-10 pb-12 space-y-8">
            <div class="bg-slate-50 rounded-[2rem] p-6 border border-slate-100 text-center">
                <p class="text-slate-500 text-sm font-semibold leading-relaxed">
                    Support our student initiatives through <span class="text-slate-900 font-bold">Solana Blinks</span>. 100% transparent and decentralized.
                </p>
            </div>

            <div class="space-y-4">
                <a href="https://dial.to/?action=solana-action:https://donation-blink.vercel.app/api/actions/donate" target="_blank" 
                   class="flex items-center justify-center w-full py-6 umt-gradient text-white rounded-[2rem] font-bold text-lg shadow-xl shadow-green-900/20 hover:scale-[1.02] transition-all active:scale-95 gap-3">
                    Donate via Dial.to
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="opacity-50"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                </a>
            </div>

            <div class="pt-8 border-t border-slate-100 flex flex-col items-center gap-6">
                <a href="https://github.com/iqrashah1/umt-donation" target="_blank" class="flex items-center gap-3 bg-slate-50 hover:bg-slate-100 px-6 py-3 rounded-2xl border border-slate-100 transition-all group">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-900 group-hover:rotate-12 transition-transform"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                    <span class="text-xs font-black text-slate-700 uppercase tracking-widest">Source Code</span>
                </a>

                <div class="flex items-center gap-5 opacity-50">
                    <div class="flex items-center gap-1">
                        <span class="text-[9px] font-black uppercase text-slate-500">Fast</span>
                    </div>
                    <div class="w-1 h-1 bg-slate-300 rounded-full"></div>
                    <div class="flex items-center gap-1">
                        <span class="text-[9px] font-black uppercase text-slate-500">Secure</span>
                    </div>
                    <div class="w-1 h-1 bg-slate-300 rounded-full"></div>
                    <div class="flex items-center gap-1">
                        <span class="text-[9px] font-black uppercase text-slate-500">Verified</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isConnected = false;
        function toggleWallet() {
            isConnected = !isConnected;
            const btn = document.getElementById('walletBtn');
            const text = document.getElementById('walletText');
            
            if (isConnected) {
                text.innerText = 'Phantom: Connected';
                btn.classList.replace('bg-slate-900', 'bg-[#006838]');
                btn.style.boxShadow = "0 10px 20px -5px rgba(0, 104, 56, 0.4)";
            } else {
                text.innerText = 'Connect Wallet';
                btn.classList.replace('bg-[#006838]', 'bg-slate-900');
                btn.style.boxShadow = "";
            }
        }
    </script>
</body>
</html>
