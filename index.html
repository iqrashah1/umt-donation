<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMT Lahore | Donation Blink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#F3F4F6] min-h-screen flex items-center justify-center p-6">

    <div class="max-w-sm w-full bg-white rounded-[2.5rem] shadow-2xl border border-gray-100 overflow-hidden transition-all hover:scale-[1.02]">
        
        <div class="bg-[#006838] p-10 text-center relative">
            <div class="absolute top-4 right-4 bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold text-white uppercase tracking-widest">
                Solana Live
            </div>
            <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-lg">
                <span class="text-[#006838] font-black text-2xl">UMT</span>
            </div>
            <h1 class="text-white text-2xl font-black tracking-tight">Donation Protocol</h1>
            <p class="text-green-100/70 text-xs mt-2 uppercase tracking-widest font-bold">Blockchain Initiative</p>
        </div>

        <div class="p-8 text-center">
            <p class="text-gray-500 text-sm leading-relaxed mb-8">
                Support UMT Lahore's student relief fund through instant, transparent blockchain donations using Solana Blinks.
            </p>

            <a href="https://dial.to" target="_blank" 
               class="block w-full py-4 bg-gray-900 text-white rounded-2xl font-bold text-lg shadow-xl shadow-gray-200 hover:bg-[#006838] transition-all active:scale-95">
                Open Blink Console
            </a>

            <div class="mt-8 flex justify-center gap-4 border-t pt-6 border-gray-50">
                <div class="flex items-center gap-1">
                    <span class="text-blue-500 text-lg">🛡️</span>
                    <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">Verified</span>
                </div>
                <div class="w-px h-4 bg-gray-200"></div>
                <div class="flex items-center gap-1">
                    <span class="text-yellow-500 text-lg">⚡</span>
                    <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">Instant</span>
                </div>
            </div>
        </div>

        <div class="bg-gray-50 p-4 text-center">
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">
                Powered by Solana Blinks
            </p>
        </div>
    </div>

</body>
</html>
